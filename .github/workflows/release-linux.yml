name: Build Linux app

# Build the Linux binary and package it (with a .desktop launcher + icon) as a
# .tar.gz. Triggered manually, or automatically when a v* tag is pushed.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Needed so the tag build can create/attach to the GitHub Release; the default
# workflow token is read-only.
permissions:
  contents: write

jobs:
  linux:
    # 24.04 ships glibc 2.39. The prebuilt ONNX Runtime the `ort` crate downloads
    # needs the C23 libc symbols (__isoc23_strtoll, …) that 22.04's glibc 2.35
    # lacks, so linking fails there.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # System libraries eframe/egui (windowing + GL), rfd (GTK file dialogs)
      # and native-tls (OpenSSL, used by ureq for model downloads) link against.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev pkg-config

      # Video playback (libVLC) is Windows-only here, so build without it.
      - name: Build
        run: cargo build --release --no-default-features

      - name: Package into a .tar.gz (binary + .desktop + icon)
        run: |
          PKG=ClarityTagFlow-linux
          mkdir -p "$PKG"
          cp target/release/Clarity_TagFlow "$PKG/Clarity_TagFlow"
          chmod +x "$PKG/Clarity_TagFlow"
          cp icons/app-icon.PNG "$PKG/app-icon.png"
          cat > "$PKG/Clarity_TagFlow.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Clarity TagFlow
          Exec=Clarity_TagFlow
          Icon=app-icon
          Categories=Graphics;Utility;
          Terminal=false
          EOF
          tar -czf ClarityTagFlow-linux.tar.gz "$PKG"

      - name: Upload .tar.gz artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClarityTagFlow-linux-tar
          path: ClarityTagFlow-linux.tar.gz

      # When triggered by a v* tag, also attach the archive to the GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClarityTagFlow-linux.tar.gz
