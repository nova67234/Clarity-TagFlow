name: CI

# Compile-check on all three platforms for every branch push and pull request, so
# a platform-specific break (e.g. a macOS-only `#[cfg]` path) is caught here
# instead of during a release-tag build. Each job mirrors the build flags of its
# matching release workflow (no-default-features everywhere; libVLC only on
# Windows). Tag pushes are intentionally excluded — those run the release builds,
# which compile anyway.
on:
  push:
    branches: ["**"]
  pull_request:

# A newer push to the same ref cancels the in-flight check.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Same system libs the Linux release build links against (eframe/egui, rfd,
      # native-tls).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev pkg-config
      # Compile everything (incl. the test targets) and run the unit tests. The
      # networked live-GitHub test is #[ignore]d, so this stays hermetic.
      - name: Check + test (no VLC)
        run: cargo test --all-targets --no-default-features

  macos:
    runs-on: macos-14 # Apple Silicon, like the release build.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      # Compile-check the macOS target — this is the path the v5.3.2 cfg break
      # would have failed on. --all-targets also type-checks the test modules.
      - name: Check (Apple Silicon, no VLC)
        run: cargo check --all-targets --no-default-features --target aarch64-apple-darwin

  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The vlc feature links `vlc`; generate an MSVC import library from the
      # checked-in export list (ci/vlc.def), same as the release build. (The VLC
      # SDK's own libvlc.lib is dlltool-format, which breaks /DELAYLOAD — see
      # release-windows.yml.) The runtime is never bundled.
      - name: Generate libVLC import library
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $libexe = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "VC\Tools\MSVC\*\bin\Hostx64\x64\lib.exe" | Select-Object -First 1
          if (-not $libexe) { throw "lib.exe not found on the runner" }
          New-Item -ItemType Directory -Force vlc_lib | Out-Null
          & $libexe /nologo /machine:x64 /def:ci\vlc.def /out:vlc_lib\vlc.lib
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed with exit code $LASTEXITCODE" }
          "VLC_LIB=$((Resolve-Path vlc_lib).Path)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
      - name: Check (with VLC)
        shell: pwsh
        env:
          RUSTFLAGS: -L native=${{ env.VLC_LIB }}
        run: cargo check --all-targets --no-default-features --features vlc
