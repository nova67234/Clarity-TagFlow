name: Build Windows app

# Build the Windows .exe (icon embedded via build.rs) and package it as a .zip.
# Triggered manually, or automatically when a v* tag is pushed.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Needed so the tag build can create/attach to the GitHub Release; the default
# workflow token is read-only.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Fetch the official libVLC build *only* for its import library (sdk\lib).
      # We do NOT bundle the runtime: the app delay-loads libVLC and uses the
      # user's installed VLC at runtime (prompting to install it if missing).
      - name: Fetch libVLC import library
        shell: pwsh
        run: |
          $ver = "3.0.21"
          Invoke-WebRequest -Uri "https://get.videolan.org/vlc/$ver/win64/vlc-$ver-win64.7z" -OutFile vlc.7z
          7z x vlc.7z -ovlc_sdk | Out-Null
          $lib = (Get-ChildItem -Path vlc_sdk -Recurse -Directory -Filter lib | Where-Object { Test-Path (Join-Path $_.FullName 'libvlc.lib') } | Select-Object -First 1).FullName
          if (-not $lib) { throw "libvlc.lib not found in the VLC archive" }
          # The crate links `vlc`, so MSVC needs vlc.lib (the SDK ships libvlc.lib).
          Copy-Item (Join-Path $lib 'libvlc.lib') (Join-Path $lib 'vlc.lib') -Force
          "VLC_LIB=$lib" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Build with the vlc feature. RUSTFLAGS overrides the machine-specific paths
      # in .cargo/config.toml: point the linker at the import lib above and
      # delay-load libvlc.dll so the exe still launches when VLC isn't installed.
      - name: Build
        shell: pwsh
        env:
          RUSTFLAGS: -L native=${{ env.VLC_LIB }} -C link-arg=/DELAYLOAD:libvlc.dll -C link-arg=delayimp.lib
        run: cargo build --release --no-default-features --features vlc

      - name: Package into a .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ClarityTagFlow-windows | Out-Null
          Copy-Item target/release/Clarity_TagFlow.exe ClarityTagFlow-windows/
          Compress-Archive -Path ClarityTagFlow-windows/* -DestinationPath ClarityTagFlow-windows.zip -Force

      - name: Upload .zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClarityTagFlow-windows-zip
          path: ClarityTagFlow-windows.zip

      # When triggered by a v* tag, also attach the .zip to the GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ClarityTagFlow-windows.zip
