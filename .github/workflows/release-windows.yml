name: Build Windows app

# Build the Windows .exe (icon embedded via build.rs) and package it as a .zip.
# Triggered manually, or automatically when a v* tag is pushed.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# Needed so the tag build can create/attach to the GitHub Release; the default
# workflow token is read-only.
permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Generate an MSVC import library for libVLC from the checked-in export
      # list (ci/vlc.def). The official VLC SDK's libvlc.lib is a MinGW/dlltool-
      # format import library that MSVC's /DELAYLOAD cannot process — link.exe
      # silently keeps libvlc.dll as a LOAD-TIME import, and the shipped exe then
      # fails to start ("libvlc.dll was not found") on machines where VLC isn't
      # on the loader's search path. lib.exe from a .def produces a proper MSVC
      # import lib that delay-loads correctly (matching local dev setups). We do
      # NOT bundle the runtime: the app delay-loads libVLC and uses the user's
      # installed VLC at runtime (prompting to install it if missing).
      - name: Generate libVLC import library
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $libexe = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "VC\Tools\MSVC\*\bin\Hostx64\x64\lib.exe" | Select-Object -First 1
          if (-not $libexe) { throw "lib.exe not found on the runner" }
          New-Item -ItemType Directory -Force vlc_lib | Out-Null
          & $libexe /nologo /machine:x64 /def:ci\vlc.def /out:vlc_lib\vlc.lib
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed with exit code $LASTEXITCODE" }
          "VLC_LIB=$((Resolve-Path vlc_lib).Path)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Build with the vlc feature. RUSTFLAGS overrides the machine-specific path
      # in .cargo/config.toml, pointing the linker at the import lib generated
      # above. The /DELAYLOAD:libvlc.dll + delayimp.lib link args are emitted by
      # build.rs (so the exe still launches when VLC isn't installed) and need not
      # be repeated here — repeating them in RUSTFLAGS is what previously left
      # libvlc as a load-time import in some builds.
      - name: Build
        shell: pwsh
        env:
          RUSTFLAGS: -L native=${{ env.VLC_LIB }}
        run: cargo build --release --no-default-features --features vlc

      # Guard: libvlc.dll must be DELAY-loaded, never a load-time import — a
      # load-time import means the exe can't even start without VLC installed.
      # Fails the build outright so a broken artifact can never ship again.
      - name: Verify libVLC is delay-loaded
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -find "VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" | Select-Object -First 1
          if (-not $dumpbin) { throw "dumpbin.exe not found on the runner" }
          $out = & $dumpbin /dependents target/release/Clarity_TagFlow.exe | Out-String
          Write-Host $out
          $parts = $out -split 'delay load dependencies'
          if ($parts[0] -match 'libvlc') { throw "libvlc.dll is a LOAD-TIME import - the delay-load was not applied" }
          if ($parts.Count -lt 2 -or $parts[1] -notmatch 'libvlc\.dll') { throw "libvlc.dll missing from the delay-load imports" }
          Write-Host "OK: libvlc.dll is delay-loaded."

      - name: Package into a .zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force ClarityTagFlow-windows | Out-Null
          Copy-Item target/release/Clarity_TagFlow.exe ClarityTagFlow-windows/
          # Bundle the runtime DLLs that `cargo build` stages next to the exe —
          # the ONNX Runtime DirectML provider (DirectML.dll) and any
          # onnxruntime*.dll — or the app fails to launch with a missing-DLL error.
          # NEVER bundle VLC (libvlc*.dll / plugins): it is LGPL and we don't ship
          # its license — the app uses the user's own VLC install at runtime and
          # offers an install link when it's missing (build.rs also skips staging
          # it when CI is set; this filter is defence in depth).
          $staged = Get-ChildItem target/release -Filter *.dll -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -notlike 'libvlc*' }
          if ($staged) { Copy-Item $staged.FullName ClarityTagFlow-windows/ -Force }
          Write-Host "Staged DLLs: $((Get-ChildItem ClarityTagFlow-windows -Filter *.dll).Name -join ', ')"
          # Guard: fail the build outright if any VLC runtime file slipped in.
          $vlcFiles = Get-ChildItem ClarityTagFlow-windows -Recurse |
            Where-Object { $_.Name -like 'libvlc*' -or $_.Name -eq 'plugins' }
          if ($vlcFiles) { throw "VLC runtime files must not be redistributed: $($vlcFiles.Name -join ', ')" }
          # Bundle the Visual C++ runtime DLLs alongside the exe (app-local
          # deployment) so users never need the Visual C++ Redistributable
          # installed. We can't statically link the CRT because the prebuilt
          # ONNX Runtime is built against the dynamic CRT (/MD), which conflicts
          # with +crt-static — shipping the DLLs is the equivalent guarantee.
          foreach ($dll in 'vcruntime140.dll','vcruntime140_1.dll','msvcp140.dll') {
            Copy-Item "$env:SystemRoot\System32\$dll" ClarityTagFlow-windows/ -ErrorAction Stop
          }
          Compress-Archive -Path ClarityTagFlow-windows/* -DestinationPath ClarityTagFlow-windows.zip -Force

      # Build a per-user installer (Inno Setup ships on the GitHub Windows image)
      # so users download one Setup.exe; it tucks the exe + DLLs into a private
      # install folder and creates shortcuts — they never see a loose .dll.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $ver = ($env:GITHUB_REF_NAME -replace '^v','')
          if (-not $ver) { $ver = '0.0.0' }
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "Inno Setup (ISCC.exe) not found at $iscc" }
          & $iscc "/DAppVer=$ver" "/DRepo=$($PWD.Path)" packaging\windows-installer.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Get-ChildItem ClarityTagFlow-Setup.exe | Format-List Name, Length

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ClarityTagFlow-windows
          path: |
            ClarityTagFlow-Setup.exe
            ClarityTagFlow-windows.zip

      # When triggered by a v* tag, attach the installer (and the portable zip as a
      # fallback) to the GitHub Release.
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ClarityTagFlow-Setup.exe
            ClarityTagFlow-windows.zip
          # Mark hyphenated tags (e.g. v0.5.0-rc.1) as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
